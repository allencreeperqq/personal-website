<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog 文章</title>
  <style>
    :root {
      --bg: #090f1d;
      --bg-2: #122544;
      --bg-3: #1a1740;
      --panel: rgba(15, 23, 42, 0.86);
      --panel-2: rgba(30, 41, 59, 0.72);
      --text: #e2e8f0;
      --muted: #9fb0c6;
      --border: rgba(148, 163, 184, 0.3);
      --accent: #38bdf8;
      --accent-2: #22d3ee;
      --accent-3: #818cf8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 22px;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        linear-gradient(140deg, rgba(9, 15, 29, 0.9), rgba(18, 37, 68, 0.84), rgba(26, 23, 64, 0.82)),
        radial-gradient(circle at 18% 16%, rgba(56, 189, 248, 0.2), transparent 36%),
        radial-gradient(circle at 86% 84%, rgba(129, 140, 248, 0.2), transparent 38%),
        var(--bg);
    }

    .post-wrap {
      width: min(900px, 100%);
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 16px;
      background:
        linear-gradient(165deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.88)),
        var(--panel);
      padding: 24px;
      box-shadow: 0 24px 40px rgba(0, 0, 0, 0.35);
    }

    .top-link {
      color: #7dd3fc;
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }

    .top-link:hover {
      border-bottom-color: #7dd3fc;
    }

    .post-title {
      margin: 14px 0 0;
      font-size: clamp(1.55rem, 2.8vw, 2rem);
    }

    .post-meta {
      margin-top: 8px;
      color: #bfdbfe;
      font-size: 0.95rem;
    }

    .post-body {
      margin-top: 18px;
      color: #cbd5e1;
      line-height: 1.78;
    }

    .post-body h1,
    .post-body h2,
    .post-body h3 {
      color: #dbeafe;
      margin: 1.2em 0 0.55em;
      line-height: 1.35;
    }

    .post-body p {
      margin: 0.9em 0;
    }

    .post-body ul {
      margin: 0.8em 0;
      padding-left: 1.2rem;
    }

    .post-body blockquote {
      margin: 0.95rem 0;
      padding: 0.7rem 0.9rem;
      border-left: 3px solid rgba(56, 189, 248, 0.78);
      border-radius: 0 10px 10px 0;
      background: linear-gradient(120deg, rgba(8, 47, 73, 0.3), rgba(30, 41, 59, 0.5));
      color: #dbeafe;
    }

    .post-body .md-table-wrap {
      margin: 1rem 0;
      overflow-x: auto;
    }

    .post-body table.md-table {
      width: 100%;
      min-width: 520px;
      border-collapse: collapse;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 10px;
      background: linear-gradient(150deg, rgba(15, 23, 42, 0.9), rgba(30, 41, 59, 0.7));
    }

    .post-body table.md-table th,
    .post-body table.md-table td {
      border: 1px solid rgba(148, 163, 184, 0.3);
      padding: 0.5rem 0.65rem;
      vertical-align: top;
      text-align: left;
      font-size: 0.95rem;
      line-height: 1.55;
      white-space: normal;
      word-break: break-word;
    }

    .post-body table.md-table thead {
      background: linear-gradient(135deg, rgba(8, 47, 73, 0.58), rgba(49, 46, 129, 0.46));
    }

    .post-body table.md-table tbody tr:nth-child(even) {
      background: rgba(30, 41, 59, 0.36);
    }

    .post-body code {
      background: linear-gradient(145deg, rgba(30, 41, 59, 0.86), rgba(30, 27, 75, 0.78));
      border: 1px solid rgba(129, 140, 248, 0.32);
      border-radius: 6px;
      padding: 0.1em 0.35em;
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.92em;
    }

    .post-body a {
      color: var(--accent);
      text-decoration: none;
    }

    .post-body a:hover {
      text-decoration: underline;
    }

    .post-body img.md-image {
      display: block;
      width: min(100%, 760px);
      height: auto;
      margin: 1rem auto;
      border-radius: 12px;
      border: 1px solid rgba(94, 234, 212, 0.45);
      box-shadow: 0 14px 26px rgba(34, 211, 238, 0.16);
      background: linear-gradient(145deg, rgba(8, 47, 73, 0.26), rgba(30, 41, 59, 0.6));
    }

    .post-body .md-pdf {
      margin: 1rem 0;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 12px;
      overflow: hidden;
      background: linear-gradient(145deg, rgba(8, 47, 73, 0.2), rgba(30, 41, 59, 0.65));
    }

    .post-body .md-pdf-title {
      padding: 0.55rem 0.75rem;
      font-size: 0.95rem;
      color: #bfdbfe;
      border-bottom: 1px solid rgba(148, 163, 184, 0.28);
      background: linear-gradient(130deg, rgba(30, 41, 59, 0.66), rgba(30, 27, 75, 0.56));
    }

    .post-body .md-pdf-frame {
      width: 100%;
      min-height: 620px;
      height: clamp(620px, 88vh, 1280px);
      border: 0;
      background: #0f172a;
    }

    .post-body .md-pdf-fallback {
      margin: 0;
      padding: 0.65rem 0.75rem;
      color: #cbd5e1;
      border-top: 1px solid rgba(148, 163, 184, 0.24);
      font-size: 0.92rem;
      background: rgba(15, 23, 42, 0.65);
    }

    .error {
      margin-top: 14px;
      color: #fca5a5;
    }
  </style>
</head>
<body>
  <main class="post-wrap">
    <a class="top-link" href="../index.html">回到首頁</a>
    <h1 id="post-title" class="post-title">載入中...</h1>
    <div id="post-meta" class="post-meta"></div>
    <article id="post-body" class="post-body"></article>
    <p id="error-text" class="error" hidden></p>
  </main>

  <script>
    function escapeHtml(input) {
      return String(input)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function parseFrontMatter(text) {
      const normalized = String(text)
        .replace(/^\uFEFF/, "")
        .replace(/\r\n/g, "\n")
        .replace(/^\s+/, "");

      const match = normalized.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
      if (!match) return { meta: {}, body: normalized };

      const meta = {};
      const lines = match[1].split(/\r?\n/);
      for (const line of lines) {
        const idx = line.indexOf(":");
        if (idx === -1) continue;
        const key = line.slice(0, idx).trim();
        const value = line.slice(idx + 1).trim();
        if (key) meta[key] = value;
      }

      return { meta, body: match[2] };
    }

    function resolveContentUrl(rawUrl, currentFile) {
      const url = String(rawUrl || "").trim();
      if (!url) return "";

      if (/^(https?:|data:|mailto:|tel:|#)/i.test(url)) {
        return url;
      }

      const encodedFile = encodeURI(currentFile || "").replace(/#/g, "%23");
      const baseUrl = new URL(`posts/${encodedFile}`, window.location.href);
      return new URL(url, baseUrl).href;
    }

    function renderInlineMarkdown(text, currentFile) {
      const imageTokens = [];
      let raw = String(text);

      raw = raw.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (match, alt, src) => {
        const tokenId = imageTokens.length;
        imageTokens.push({
          alt: String(alt),
          src: resolveContentUrl(src, currentFile)
        });
        return `__MD_IMAGE_TOKEN_${tokenId}__`;
      });

      let rendered = escapeHtml(raw)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\*([^*]+)\*/g, "<em>$1</em>")
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');

      rendered = rendered.replace(/__MD_IMAGE_TOKEN_(\d+)__/g, (match, idx) => {
        const token = imageTokens[Number(idx)];
        if (!token || !token.src) return "";
        const safeAlt = escapeHtml(token.alt);
        const safeSrc = escapeHtml(token.src);
        return `<img class="md-image" src="${safeSrc}" alt="${safeAlt}" loading="lazy" />`;
      });

      return rendered;
    }

    function renderPdfEmbedLine(rawLine, currentFile) {
      const line = String(rawLine || "").trim();

      const customMatch = line.match(/^!pdf(?:\[([^\]]*)\])?\(([^)]+)\)$/i);
      const linkMatch = line.match(/^\[([^\]]+)\]\(([^)]+\.pdf(?:[#?][^)]+)?)\)$/i);
      let title = "";
      let url = "";

      if (customMatch) {
        title = String(customMatch[1] || "PDF 預覽").trim() || "PDF 預覽";
        url = customMatch[2];
      } else if (linkMatch) {
        title = String(linkMatch[1] || "PDF 預覽").trim() || "PDF 預覽";
        url = linkMatch[2];
      } else {
        return "";
      }

      const resolved = resolveContentUrl(url, currentFile);
      if (!resolved) return "";

      const safeTitle = escapeHtml(title);
      const safeUrl = escapeHtml(resolved);

      return [
        '<section class="md-pdf">',
        `  <div class="md-pdf-title">${safeTitle}</div>`,
        `  <iframe class="md-pdf-frame" src="${safeUrl}" title="${safeTitle}" loading="lazy"></iframe>`,
        '  <p class="md-pdf-fallback">',
        `    若無法預覽，請改用<a href="${safeUrl}" target="_blank" rel="noopener noreferrer">新分頁開啟 PDF</a>。`,
        "  </p>",
        "</section>"
      ].join("\n");
    }

    function isTableRowLine(rawLine) {
      const line = String(rawLine || "").trim();
      if (!line.startsWith("|")) return false;
      const pipeCount = (line.match(/\|/g) || []).length;
      return pipeCount >= 2;
    }

    function splitTableCells(rawLine) {
      const line = String(rawLine || "").trim();
      return line
        .replace(/^\|/, "")
        .replace(/\|$/, "")
        .split("|")
        .map((cell) => cell.trim());
    }

    function isTableSeparatorLine(rawLine) {
      if (!isTableRowLine(rawLine)) return false;
      const cells = splitTableCells(rawLine);
      if (!cells.length) return false;
      return cells.every((cell) => {
        const marker = cell.replace(/\s+/g, "");
        return /^:?-{3,}:?$/.test(marker);
      });
    }

    function buildTableHtml(tableLines, currentFile) {
      if (!tableLines.length) return "";

      let headerCells = null;
      let bodyRows = [];

      if (tableLines.length >= 2 && isTableSeparatorLine(tableLines[1])) {
        headerCells = splitTableCells(tableLines[0]);
        bodyRows = tableLines.slice(2).map(splitTableCells);
      } else {
        bodyRows = tableLines.map(splitTableCells);
      }

      let colCount = 0;
      if (headerCells) colCount = Math.max(colCount, headerCells.length);
      for (const row of bodyRows) colCount = Math.max(colCount, row.length);
      if (colCount === 0) return "";

      const normalizeRow = (row) => {
        const next = row.slice();
        while (next.length < colCount) next.push("");
        return next;
      };

      let html = '<div class="md-table-wrap"><table class="md-table">';

      if (headerCells) {
        const header = normalizeRow(headerCells)
          .map((cell) => `<th>${renderInlineMarkdown(cell, currentFile)}</th>`)
          .join("");
        html += `<thead><tr>${header}</tr></thead>`;
      }

      if (bodyRows.length) {
        const rows = bodyRows
          .map((row) => {
            const cells = normalizeRow(row)
              .map((cell) => `<td>${renderInlineMarkdown(cell, currentFile)}</td>`)
              .join("");
            return `<tr>${cells}</tr>`;
          })
          .join("");
        html += `<tbody>${rows}</tbody>`;
      }

      html += "</table></div>";
      return html;
    }

    function markdownToHtml(markdown, currentFile) {
      const lines = markdown.replace(/\r\n/g, "\n").split("\n");
      const html = [];
      let inList = false;
      let inQuote = false;
      let quoteLines = [];

      const flushQuote = () => {
        if (!inQuote) return;
        const content = quoteLines
          .map((entry) => renderInlineMarkdown(entry, currentFile))
          .join("<br>");
        html.push(`<blockquote>${content}</blockquote>`);
        inQuote = false;
        quoteLines = [];
      };

      for (let i = 0; i < lines.length; i += 1) {
        const rawLine = lines[i];
        const line = rawLine.trim();

        if (!line) {
          if (inList) {
            html.push("</ul>");
            inList = false;
          }
          flushQuote();
          continue;
        }

        const quoteMatch = rawLine.match(/^\s*>\s?(.*)$/);
        if (quoteMatch) {
          if (inList) {
            html.push("</ul>");
            inList = false;
          }
          if (!inQuote) {
            inQuote = true;
            quoteLines = [];
          }
          quoteLines.push(quoteMatch[1]);
          continue;
        }

        flushQuote();

        if (isTableRowLine(rawLine)) {
          if (inList) {
            html.push("</ul>");
            inList = false;
          }

          const tableLines = [];
          while (i < lines.length && isTableRowLine(lines[i])) {
            tableLines.push(lines[i].trim());
            i += 1;
          }

          const tableHtml = buildTableHtml(tableLines, currentFile);
          if (tableHtml) html.push(tableHtml);
          i -= 1;
          continue;
        }

        const pdfEmbedHtml = renderPdfEmbedLine(rawLine, currentFile);
        if (pdfEmbedHtml) {
          if (inList) {
            html.push("</ul>");
            inList = false;
          }
          html.push(pdfEmbedHtml);
          continue;
        }

        if (line.startsWith("### ")) {
          if (inList) {
            html.push("</ul>");
            inList = false;
          }
          html.push(`<h3>${renderInlineMarkdown(line.slice(4), currentFile)}</h3>`);
          continue;
        }

        if (line.startsWith("## ")) {
          if (inList) {
            html.push("</ul>");
            inList = false;
          }
          html.push(`<h2>${renderInlineMarkdown(line.slice(3), currentFile)}</h2>`);
          continue;
        }

        if (line.startsWith("# ")) {
          if (inList) {
            html.push("</ul>");
            inList = false;
          }
          html.push(`<h1>${renderInlineMarkdown(line.slice(2), currentFile)}</h1>`);
          continue;
        }

        if (line.startsWith("- ")) {
          if (!inList) {
            html.push("<ul>");
            inList = true;
          }
          html.push(`<li>${renderInlineMarkdown(line.slice(2), currentFile)}</li>`);
          continue;
        }

        if (inList) {
          html.push("</ul>");
          inList = false;
        }
        html.push(`<p>${renderInlineMarkdown(line, currentFile)}</p>`);
      }

      if (inList) html.push("</ul>");
      flushQuote();
      return html.join("\n");
    }

    async function loadPost() {
      const titleEl = document.getElementById("post-title");
      const metaEl = document.getElementById("post-meta");
      const bodyEl = document.getElementById("post-body");
      const errorEl = document.getElementById("error-text");

      if (window.location.protocol === "file:") {
        errorEl.hidden = false;
        errorEl.textContent = "偵測到 file:// 直接開啟，瀏覽器會阻擋 fetch。請改用 GitHub Pages 或本機伺服器預覽。";
        titleEl.textContent = "無法載入文章";
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const file = params.get("file");
      if (!file) {
        errorEl.hidden = false;
        errorEl.textContent = "找不到文章參數，請從首頁重新進入。";
        titleEl.textContent = "無法載入文章";
        return;
      }

      const safeFile = file.replace(/\.\./g, "").replace(/^\//, "");
      const postPath = `posts/${safeFile}`;

      try {
        const response = await fetch(postPath, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const markdown = await response.text();
        const { meta, body } = parseFrontMatter(markdown);
        titleEl.textContent = meta.title || safeFile;
        metaEl.textContent = `${meta.date || "未設定日期"} | ${meta.category || "未分類"}`;
        bodyEl.innerHTML = markdownToHtml(body, safeFile);
      } catch (err) {
        errorEl.hidden = false;
        errorEl.textContent = `文章讀取失敗：${err.message}`;
        titleEl.textContent = "無法載入文章";
      }
    }

    loadPost();
  </script>
</body>
</html>
